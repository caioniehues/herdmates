# Example launcher table — installed to $HERDR_PLUGIN_CONFIG_DIR/agents.toml.
# See docs/spec.md §3 and ADR-0006. Add your agent as a new table — no code.

[claude]
command = ["claude"]
submit_verify = true
reads_agents_md = "pointer"   # needs a pointer line in the launch prompt
queues_midturn = true          # mid-turn pane run queues cleanly (live-verified)

[codex]
command = ["codex"]
submit_verify = true
reads_agents_md = "native"    # honors the repository's authored AGENTS.md natively
queues_midturn = true          # mid-turn pane run queues cleanly (live-verified)
