# Example launcher table — installed to $HERDR_PLUGIN_CONFIG_DIR/agents.toml.
# See docs/spec.md §3 and ADR-0006. Add your agent as a new table — no code.

[claude]
command = ["claude"]
submit_verify = true
reads_agents_md = "pointer"   # needs a pointer line in the launch prompt
queues_midturn = true          # mid-turn pane run queues cleanly (live-verified)
# NOTE (live-verified 2026-07-15): codex's default sandbox denies herdr socket
# access ("Operation not permitted"), so a plain-codex worker cannot run the
# `msg` verb without an interactive approval. Teams relying on worker->god
# messaging from codex should use a permissive entry, e.g.:
#   command = ["codex", "--dangerously-bypass-approvals-and-sandbox"]
# Weigh that trade-off deliberately; the shipped default stays sandboxed.

[codex]
command = ["codex"]
submit_verify = true
reads_agents_md = "native"    # honors the repository's authored AGENTS.md natively
queues_midturn = true          # mid-turn pane run queues cleanly (live-verified)
